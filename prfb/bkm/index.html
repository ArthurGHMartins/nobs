<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procuração eCAC</title>
<style>
  body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
  h2 { font-size: 18px; margin-bottom: 8px; }
  p { font-size: 14px; color: #666; margin-bottom: 24px; }
  button {
    display: block; width: 100%; padding: 16px;
    font-size: 16px; font-weight: bold; border: none;
    border-radius: 10px; cursor: pointer; margin-bottom: 16px;
  }
  #btn-abrir { background: #1a73e8; color: white; }
  #btn-preencher { background: #2e7d32; color: white; }
  #status { font-size: 14px; color: #333; margin-top: 16px; padding: 12px; background: white; border-radius: 8px; display: none; }
</style>
</head>
<body>

<h2>Procuração eCAC</h2>
<p>Passo 1: Abra o eCAC e faça login.<br>Passo 2: Navegue até a página de seleção de serviços.<br>Passo 3: Volte aqui e clique em Preencher.</p>

<button id="btn-abrir" onclick="abrirEcac()">1. Abrir eCAC</button>
<button id="btn-preencher" onclick="preencher()">2. Preencher campos</button>

<div id="status"></div>

<script>
var janelaEcac = null;

function abrirEcac() {
  janelaEcac = window.open('https://cav.receita.fazenda.gov.br', '_blank');
  mostrarStatus('eCAC aberto. Faça login, navegue até os checkboxes e volte aqui.');
}

function preencher() {
  if (!janelaEcac) {
    mostrarStatus('Erro: abra o eCAC pelo botão acima primeiro.');
    return;
  }

  try {
    var codes = ['00143','00006','00050','00197','00083','00021','00085','00025','00086','00087','00226','00051','00002'];
    var marcados = 0, naoEncontrados = [];

    codes.forEach(function(c) {
      var cb = janelaEcac.document.querySelector('input[id$="-' + c + '"]');
      if (cb) {
        var label = janelaEcac.document.querySelector('label[for="' + cb.id + '"]');
        if (label && !cb.checked) {
          label.dispatchEvent(new janelaEcac.MouseEvent('click', { bubbles: true, cancelable: true }));
        }
        marcados++;
      } else {
        naoEncontrados.push(c);
      }
    });

    var msg = 'Marcados: ' + marcados + ' de ' + codes.length + '.';
    if (naoEncontrados.length) msg += ' Não encontrados: ' + naoEncontrados.join(', ');
    mostrarStatus(msg);

  } catch(e) {
    mostrarStatus('Erro de segurança: ' + e.message);
  }
}

function mostrarStatus(msg) {
  var el = document.getElementById('status');
  el.style.display = 'block';
  el.textContent = msg;
}
</script>
</body>
</html>
