

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }

  .hero {
    background: #1a3a2a;
    color: #fff;
    padding: 2rem 1.25rem 1.5rem;
    text-align: center;
  }
  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1rem;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: #4caf7d;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff; letter-spacing: -0.5px;
  }
  .logo-text { font-size: 20px; font-weight: 500; color: #fff; letter-spacing: 0.5px; }
  .hero h1 { font-size: 17px; font-weight: 500; color: #b8ddc8; line-height: 1.4; }
  .hero p { font-size: 13px; color: #7aaa90; margin-top: 6px; }

  .progress-bar {
    background: #2a4a3a;
    height: 4px;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: #4caf7d;
    transition: width 0.4s ease;
  }
  .step-counter {
    background: #f5f7f5;
    padding: 10px 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .step-label { font-size: 12px; color: var(--color-text-secondary); }
  .step-num { font-size: 13px; font-weight: 500; color: #1a3a2a; }

  .content {
    padding: 1.5rem 1.25rem;
    min-height: 280px;
  }

  .step-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #e8f5ee;
    color: #1a6b3a;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 1rem;
    letter-spacing: 0.3px;
  }
  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf7d;
  }

  .step-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.3;
    margin-bottom: 0.75rem;
  }

  .step-body {
    font-size: 14px;
    color: var(--color-text-secondary);
    line-height: 1.65;
  }

  .highlight-box {
    background: #f0faf4;
    border-left: 3px solid #4caf7d;
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin: 1rem 0;
    font-size: 13px;
    color: #1a4a2a;
  }
  .highlight-box strong { font-weight: 500; display: block; margin-bottom: 4px; font-size: 12px; color: #4caf7d; letter-spacing: 0.3px; }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #1a3a2a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: #2a5a3a; }
  .copy-btn.copied { background: #4caf7d; }

  .service-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 1rem;
  }
  .service-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--color-background-secondary);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--color-text-primary);
    line-height: 1.4;
  }
  .service-code {
    background: #e8f5ee;
    color: #1a6b3a;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .obs-box {
    background: #fff8e8;
    border-left: 3px solid #e8a020;
    border-radius: 0 8px 8px 0;
    padding: 10px 12px;
    font-size: 12px;
    color: #7a5010;
    margin-top: 1rem;
    line-height: 1.5;
  }

  .nav {
    display: flex;
    gap: 10px;
    padding: 1rem 1.25rem 1.5rem;
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .btn-back {
    flex: 1;
    padding: 12px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 10px;
    background: transparent;
    color: var(--color-text-secondary);
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-back:hover { background: var(--color-background-secondary); }
  .btn-next {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #1a3a2a;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-next:hover { background: #2a5a3a; }
  .btn-link {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #1a6bce;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .success-icon {
    width: 56px; height: 56px;
    background: #e8f5ee;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    margin: 0 auto 1.25rem;
  }

  .hidden { display: none; }
</style>

<div class="hero">
  <div class="logo-mark">
    <div class="logo-icon">MQ</div>
    <span class="logo-text">Maqrec</span>
  </div>
  <h1>Autorização de acesso ao e-CAC</h1>
  <p>Siga os passos abaixo — leva menos de 5 minutos</p>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress" style="width: 9%"></div>
</div>

<div class="step-counter">
  <span class="step-label">Progresso</span>
  <span class="step-num" id="step-counter">Passo 1 de 11</span>
</div>

<div class="content" id="content"></div>

<div class="nav" id="nav">
  <button class="btn-back" id="btn-back" onclick="prevStep()">Voltar</button>
  <button class="btn-next" id="btn-next" onclick="nextStep()">Continuar</button>
</div>

<script>
const steps = [
  {
    tag: "Antes de começar",
    title: "Ative as notificações do app gov.br",
    body: `Você precisará receber um código de confirmação pelo app gov.br. Por isso, ative as notificações agora.`,
    extra: `<div class="highlight-box"><strong>Android</strong>Configurações &gt; Aplicativos &gt; gov.br &gt; Permitir notificações</div><div class="highlight-box"><strong>iPhone</strong>Ajustes &gt; gov.br &gt; Notificações &gt; Permitir<br><br>Se usar Safari: Ajustes &gt; Safari &gt; desative "Bloquear Pop-ups"</div>`
  },
  {
    tag: "Antes de começar",
    title: "Baixe e acesse o app gov.br",
    body: `Baixe o app gov.br no seu celular (disponível na App Store e Google Play), acesse com seu CPF e senha, e faça a validação facial quando solicitado.`,
    extra: `<div class="obs-box">A validação facial é obrigatória para atingir o nível de conta necessário para assinar a procuração.</div>`
  },
  {
    tag: "Acessando o e-CAC",
    title: "Acesse o portal e-CAC",
    body: `Toque no botão abaixo para abrir o portal e-CAC. Em seguida, clique em "Entrar com GOV.BR" e faça login com seu CPF e senha.`,
    extra: `<div class="obs-box">Se estiver pelo celular, após entrar procure e clique em <strong>"versão clássica"</strong> na parte inferior da tela.</div>`,
    link: { url: "https://cav.receita.fazenda.gov.br/autenticacao/login", label: "Abrir o e-CAC" }
  },
  {
    tag: "Procuração",
    title: "Acesse Autorizações de Acesso",
    body: `Após entrar no e-CAC, localize e clique no botão azul:`,
    extra: `<div class="highlight-box"><strong>O que clicar</strong>Autorizações de Acesso (Procurações)</div><div class="highlight-box"><strong>Em seguida</strong>Minhas Autorizações de Acesso</div>`
  },
  {
    tag: "Procuração",
    title: "Crie uma nova autorização",
    body: `Na página "Minhas Autorizações de Acesso", clique novamente em "Entrar com GOV.BR" e depois no botão:`,
    extra: `<div class="highlight-box"><strong>Botão a clicar</strong>+ Nova Autorização</div>`
  },
  {
    tag: "Procuração",
    title: "Informe o CNPJ da Maqrec",
    body: `No campo "Pessoa Autorizada", digite o CNPJ abaixo. Verifique se o nome da empresa aparece automaticamente.`,
    extra: `<div class="highlight-box"><strong>CNPJ</strong>27.677.082/0001-60<br><button class="copy-btn" id="cnpj-btn" onclick="copyCNPJ()">Copiar CNPJ</button></div><div class="obs-box">Deve aparecer: <strong>Maqrec Recuperadora de Contribuições e Créditos LTDA</strong>. Se não aparecer, recarregue a página e tente novamente.</div><div class="highlight-box"><strong>Validade</strong>Defina como 15/05/2028 e clique em Avançar</div>`
  },
  {
    tag: "Procuração",
    title: "Clique em Selecionar Serviços",
    body: `Na tela de serviços, clique no botão "Selecionar Serviços". Você irá buscar e marcar cada serviço individualmente pelo código.`,
    extra: `<div class="obs-box">Faça a busca e marque um serviço por vez, usando os códigos listados no próximo passo.</div>`
  },
  {
    tag: "Procuração",
    title: "Marque os 13 serviços",
    body: `Busque cada código abaixo, marque o serviço e confirme. Repita para todos:`,
    extra: `<div class="service-list">
      <div class="service-item"><span class="service-code">00143</span>Acessar PER/DCOMP WEB</div>
      <div class="service-item"><span class="service-code">00006</span>Caixa Postal - Mensagens</div>
      <div class="service-item"><span class="service-code">00050</span>Caixa Postal - Termo de Opção pelo Domicílio Tributário Eletrônico</div>
      <div class="service-item"><span class="service-code">00197</span>CHAT RFB e Receita Atende - Todos os serviços</div>
      <div class="service-item"><span class="service-code">00083</span>Comunicação para Compensação de Ofício</div>
      <div class="service-item"><span class="service-code">00021</span>Fontes Pagadoras</div>
      <div class="service-item"><span class="service-code">00085</span>PER/DCOMP - Consulta Análise Preliminar</div>
      <div class="service-item"><span class="service-code">00025</span>PER/DCOMP - Consulta Despacho Decisório</div>
      <div class="service-item"><span class="service-code">00086</span>PER/DCOMP - Consulta Intimação</div>
      <div class="service-item"><span class="service-code">00087</span>PER/DCOMP - Consulta Processamento</div>
      <div class="service-item"><span class="service-code">00226</span>PGFN - todos serviços do REGULARIZE, SISPAR e atendimento</div>
      <div class="service-item"><span class="service-code">00051</span>Processos Digitais e Requerimentos Web</div>
      <div class="service-item"><span class="service-code">00002</span>Situação Fiscal do Contribuinte</div>
    </div>`
  },
  {
    tag: "Procuração",
    title: "Confirme e avance",
    body: `Após marcar todos os 13 serviços, clique em Confirmar e depois em Avançar. Na próxima página você irá assinar.`,
    extra: `<div class="obs-box">Se aparecer a pergunta <strong>"Gostaria de restringir os poderes quanto a processos digitais?"</strong> — clique em <strong>NÃO</strong>.</div>`
  },
  {
    tag: "Assinatura",
    title: "Autorize e insira o código",
    body: `O portal vai solicitar sua autorização. Clique em "Autorizar". Um código será enviado por notificação push para o app gov.br no seu celular.`,
    extra: `<div class="highlight-box"><strong>Como encontrar o código</strong>Deslize a tela do celular de cima para baixo — o código aparece na barra de notificações. Não precisa abrir o app.</div><div class="obs-box">O código tem 6 dígitos. Digite-o no campo da tela e clique em Autorizar.</div>`
  },
  {
    tag: "Concluído!",
    title: "Procuração registrada com sucesso",
    body: `Você vai ver a mensagem "Autorização registrada com sucesso!" — a procuração está concluída.`,
    extra: `<div style="text-align:center; margin-top: 1.5rem;">
      <div class="success-icon">✓</div>
      <p style="font-size: 14px; color: var(--color-text-secondary); line-height: 1.6;">Obrigado por concluir a autorização!<br>Nossa equipe já pode acompanhar sua situação fiscal.</p>
      <div style="margin-top: 1.5rem; padding: 1rem; background: #f0faf4; border-radius: 10px;">
        <p style="font-size: 13px; color: #1a4a2a; font-weight: 500;">Precisa de ajuda?</p>
        <p style="font-size: 12px; color: #4a7a5a; margin-top: 4px;">Entre em contato com nossa equipe pelo WhatsApp</p>
      </div>
    </div>`,
    last: true
  }
];

let current = 0;

function render() {
  const s = steps[current];
  const pct = Math.round(((current + 1) / steps.length) * 100);
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('step-counter').textContent = `Passo ${current + 1} de ${steps.length}`;

  let html = `
    <div class="step-tag"><div class="step-dot"></div>${s.tag}</div>
    <h2 class="step-title">${s.title}</h2>
    <p class="step-body">${s.body}</p>
    ${s.extra || ''}
  `;
  document.getElementById('content').innerHTML = html;

  const nav = document.getElementById('nav');
  const btnNext = document.getElementById('btn-next');
  const btnBack = document.getElementById('btn-back');

  if (s.last) {
    nav.innerHTML = '';
    return;
  }

  nav.innerHTML = `
    <button class="btn-back" onclick="prevStep()" ${current === 0 ? 'style="visibility:hidden"' : ''}>Voltar</button>
    ${s.link
      ? `<a class="btn-link" href="${s.link.url}" target="_blank" onclick="setTimeout(nextStep, 800)">${s.link.label} →</a>`
      : `<button class="btn-next" onclick="nextStep()">Continuar</button>`
    }
  `;
}

function nextStep() {
  if (current < steps.length - 1) { current++; render(); }
}
function prevStep() {
  if (current > 0) { current--; render(); }
}

function copyCNPJ() {
  navigator.clipboard.writeText('27.677.082/0001-60').then(() => {
    const btn = document.getElementById('cnpj-btn');
    if (btn) { btn.textContent = 'Copiado!'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = 'Copiar CNPJ'; btn.classList.remove('copied'); }, 2000); }
  });
}

render();
</script>
