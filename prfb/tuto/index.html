

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2a5a3a;
    --green-accent: #4caf7d;
    --green-light: #e8f5ee;
    --green-text: #1a6b3a;
    --amber-bg: #fff8e8;
    --amber-border: #e8a020;
    --amber-text: #7a5010;
  }

  .wrap {
    max-width: 600px;
    margin: 0 auto;
    font-family: var(--font-sans);
    font-size: 16px;
  }

  .hero {
    background: var(--green-dark);
    padding: 2rem 1.5rem 1.75rem;
    text-align: center;
  }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--green-accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #fff;
  }
  .logo-name { font-size: 22px; font-weight: 500; color: #fff; }
  .hero-title { font-size: 18px; font-weight: 500; color: #b8ddc8; line-height: 1.4; }
  .hero-sub { font-size: 14px; color: #7aaa90; margin-top: 6px; }

  .progress-wrap { background: #2a4a3a; height: 5px; }
  .progress-fill { height: 100%; background: var(--green-accent); transition: width 0.4s ease; }

  .step-bar {
    background: var(--green-light);
    padding: 10px 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 0.5px solid #c8e8d8;
  }
  .step-bar-label { font-size: 13px; color: var(--green-text); }
  .step-bar-num { font-size: 13px; font-weight: 500; color: var(--green-dark); }

  .content {
    padding: 1.75rem 1.5rem 1rem;
    min-height: 300px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--green-light);
    color: var(--green-text);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 1.1rem;
    letter-spacing: 0.2px;
  }
  .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-accent); flex-shrink: 0; }

  .step-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.3;
    margin-bottom: 0.9rem;
  }

  .step-body {
    font-size: 15px;
    color: var(--color-text-secondary);
    line-height: 1.7;
  }

  .info-box {
    background: var(--green-light);
    border-left: 3px solid var(--green-accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    margin-top: 1.1rem;
  }
  .info-box-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--green-accent);
    letter-spacing: 0.4px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .info-box-val {
    font-size: 15px;
    color: var(--green-dark);
    line-height: 1.5;
    font-weight: 500;
  }

  .obs {
    background: var(--amber-bg);
    border-left: 3px solid var(--amber-border);
    border-radius: 0 10px 10px 0;
    padding: 12px 14px;
    margin-top: 1rem;
    font-size: 13px;
    color: var(--amber-text);
    line-height: 1.6;
  }

  .copy-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--green-dark);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.2s;
    min-height: 44px;
  }
  .copy-btn:active { background: var(--green-accent); }
  .copy-btn.copied { background: var(--green-accent); }

  .services {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-top: 1rem;
  }
  .svc {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--color-background-secondary);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 14px;
    color: var(--color-text-primary);
    line-height: 1.4;
  }
  .svc-code {
    background: var(--green-light);
    color: var(--green-text);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 7px;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
    letter-spacing: 0.3px;
  }

  .nav {
    display: flex;
    gap: 10px;
    padding: 1rem 1.5rem 1.75rem;
    border-top: 0.5px solid var(--color-border-tertiary);
  }
  .btn-back {
    flex: 1;
    padding: 0 16px;
    height: 52px;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 12px;
    background: transparent;
    color: var(--color-text-secondary);
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-back:active { background: var(--color-background-secondary); }
  .btn-next {
    flex: 2;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: var(--green-dark);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-next:active { background: var(--green-mid); }
  .btn-link {
    flex: 2;
    height: 52px;
    border: none;
    border-radius: 12px;
    background: #1a6bce;
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-link:active { opacity: 0.85; }

  .success-wrap { text-align: center; padding-top: 0.5rem; }
  .success-circle {
    width: 68px; height: 68px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    margin: 0 auto 1.25rem;
    color: var(--green-accent);
  }
  .success-title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }
  .success-body { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; }
  .success-card {
    background: var(--green-light);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1.5rem;
    text-align: left;
  }
  .success-card p { font-size: 14px; color: var(--green-text); line-height: 1.6; }
  .success-card strong { font-weight: 500; display: block; margin-bottom: 4px; color: var(--green-dark); font-size: 15px; }
</style>

<div class="wrap">
  <div class="hero">
    <div class="logo-row">
      <div class="logo-icon">MQ</div>
      <span class="logo-name">Maqrec</span>
    </div>
    <div class="hero-title">Autorização de acesso ao e-CAC</div>
    <div class="hero-sub">Siga os passos — leva menos de 5 minutos</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="prog" style="width:9%"></div>
  </div>

  <div class="step-bar">
    <span class="step-bar-label" id="step-label">Progresso</span>
    <span class="step-bar-num" id="step-num">Passo 1 de 11</span>
  </div>

  <div class="content" id="content"></div>

  <div class="nav" id="nav"></div>
</div>

<script>
const steps = [
  {
    tag: "Antes de começar",
    title: "Ative as notificações do gov.br",
    body: "Você precisará receber um código pelo app gov.br. Ative as notificações agora para não travar no final.",
    extras: [
      { type: "info", label: "Android", val: "Configurações → Aplicativos → gov.br → Permitir notificações" },
      { type: "info", label: "iPhone", val: "Ajustes → gov.br → Notificações → Permitir notificações" },
      { type: "info", label: "Safari no iPhone", val: "Ajustes → Safari → desative \"Bloquear Pop-ups\"" }
    ]
  },
  {
    tag: "Antes de começar",
    title: "Baixe e acesse o app gov.br",
    body: "Baixe o app gov.br (App Store ou Google Play). Acesse com seu CPF e senha e faça a validação facial quando solicitado.",
    extras: [
      { type: "obs", val: "A validação facial é obrigatória para assinar a procuração." }
    ]
  },
  {
    tag: "Acessando o e-CAC",
    title: "Abra o portal e-CAC",
    body: "Toque no botão abaixo para abrir o e-CAC. Clique em \"Entrar com GOV.BR\" e faça login com seu CPF e senha.",
    extras: [
      { type: "obs", val: "Se estiver pelo celular, após entrar clique em \"versão clássica\" na parte inferior da tela." }
    ],
    link: { url: "https://cav.receita.fazenda.gov.br/autenticacao/login", label: "Abrir o e-CAC" }
  },
  {
    tag: "Criando a procuração",
    title: "Vá em Autorizações de Acesso",
    body: "Após entrar no e-CAC, localize e clique no menu:",
    extras: [
      { type: "info", label: "1º clique", val: "Autorizações de Acesso (Procurações)" },
      { type: "info", label: "2º clique", val: "Minhas Autorizações de Acesso" }
    ]
  },
  {
    tag: "Criando a procuração",
    title: "Crie uma nova autorização",
    body: "Na página \"Minhas Autorizações de Acesso\", clique em \"Entrar com GOV.BR\" e em seguida:",
    extras: [
      { type: "info", label: "Botão", val: "+ Nova Autorização" }
    ]
  },
  {
    tag: "Criando a procuração",
    title: "Informe o CNPJ da Maqrec",
    body: "No campo \"Pessoa Autorizada\", digite o nosso CNPJ. Verifique se o nome da empresa aparece abaixo.",
    extras: [
      { type: "info", label: "CNPJ", val: "27.677.082/0001-60", copy: true },
      { type: "obs", val: "Deve aparecer: Maqrec Recuperadora de Contribuições e Créditos LTDA. Se não aparecer, recarregue e tente novamente." },
      { type: "info", label: "Validade", val: "15/05/2028 — depois clique em Avançar" }
    ]
  },
  {
    tag: "Criando a procuração",
    title: "Clique em Selecionar Serviços",
    body: "Na tela de serviços, clique no botão \"Selecionar Serviços\". Você irá buscar e marcar cada item pelo código.",
    extras: [
      { type: "obs", val: "Busque e marque um serviço por vez. O próximo passo lista todos os códigos." }
    ]
  },
  {
    tag: "Criando a procuração",
    title: "Marque os 13 serviços",
    body: "Busque cada código abaixo, marque o item e confirme. Repita para todos os 13:",
    services: [
      { code: "00143", name: "Acessar PER/DCOMP WEB" },
      { code: "00006", name: "Caixa Postal - Mensagens" },
      { code: "00050", name: "Caixa Postal - Termo de Opção pelo Domicílio Tributário Eletrônico" },
      { code: "00197", name: "CHAT RFB e Receita Atende - Todos os serviços" },
      { code: "00083", name: "Comunicação para Compensação de Ofício" },
      { code: "00021", name: "Fontes Pagadoras" },
      { code: "00085", name: "PER/DCOMP - Consulta Análise Preliminar" },
      { code: "00025", name: "PER/DCOMP - Consulta Despacho Decisório" },
      { code: "00086", name: "PER/DCOMP - Consulta Intimação" },
      { code: "00087", name: "PER/DCOMP - Consulta Processamento" },
      { code: "00226", name: "PGFN - todos serviços do REGULARIZE, SISPAR e atendimento" },
      { code: "00051", name: "Processos Digitais e Requerimentos Web" },
      { code: "00002", name: "Situação Fiscal do Contribuinte" }
    ]
  },
  {
    tag: "Criando a procuração",
    title: "Confirme e avance",
    body: "Após marcar todos os 13 serviços, clique em Confirmar e depois em Avançar.",
    extras: [
      { type: "obs", val: "Se aparecer \"Gostaria de restringir os poderes quanto a processos digitais?\" — clique em NÃO." }
    ]
  },
  {
    tag: "Assinatura",
    title: "Autorize e insira o código",
    body: "O portal vai pedir autorização. Clique em \"Autorizar\". Um código de 6 dígitos chegará por notificação push no app gov.br.",
    extras: [
      { type: "info", label: "Como achar o código", val: "Deslize a tela do celular de cima para baixo. O código aparece na barra de notificações — não precisa abrir o app." },
      { type: "obs", val: "Digite o código no campo da tela e clique em Autorizar." }
    ]
  },
  {
    tag: "Concluído",
    title: "Tudo pronto!",
    body: "",
    success: true
  }
];

let cur = 0;

function render() {
  const s = steps[cur];
  const pct = Math.round(((cur + 1) / steps.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('step-num').textContent = `Passo ${cur + 1} de ${steps.length}`;

  let html = `<div class="tag"><div class="tag-dot"></div>${s.tag}</div>
    <div class="step-title">${s.title}</div>`;

  if (s.success) {
    html += `<div class="success-wrap">
      <div class="success-circle">✓</div>
      <div class="success-title">Autorização registrada!</div>
      <div class="success-body">A mensagem "Autorização registrada com sucesso!" apareceu na tela.<br>Você pode fechar esta página.</div>
      <div class="success-card">
        <strong>Precisa de ajuda?</strong>
        <p>Entre em contato com nossa equipe pelo WhatsApp — ficamos felizes em ajudar.</p>
      </div>
    </div>`;
  } else {
    html += `<div class="step-body">${s.body}</div>`;
    if (s.extras) {
      s.extras.forEach((e, i) => {
        if (e.type === 'info') {
          html += `<div class="info-box">
            <div class="info-box-label">${e.label}</div>
            <div class="info-box-val">${e.val}</div>
            ${e.copy ? `<button class="copy-btn" id="cbtn" onclick="doCopy()">Copiar CNPJ</button>` : ''}
          </div>`;
        } else {
          html += `<div class="obs">${e.val}</div>`;
        }
      });
    }
    if (s.services) {
      html += `<div class="services">`;
      s.services.forEach(sv => {
        html += `<div class="svc"><span class="svc-code">${sv.code}</span><span>${sv.name}</span></div>`;
      });
      html += `</div>`;
    }
  }

  document.getElementById('content').innerHTML = html;

  const nav = document.getElementById('nav');
  if (s.success) { nav.innerHTML = ''; return; }

  let backBtn = cur > 0
    ? `<button class="btn-back" onclick="go(-1)">Voltar</button>`
    : `<button class="btn-back" style="visibility:hidden">Voltar</button>`;

  let fwdBtn = s.link
    ? `<a class="btn-link" href="${s.link.url}" target="_blank" onclick="setTimeout(()=>go(1),600)">${s.link.label} →</a>`
    : `<button class="btn-next" onclick="go(1)">Continuar</button>`;

  nav.innerHTML = backBtn + fwdBtn;
}

function go(dir) {
  cur = Math.min(Math.max(cur + dir, 0), steps.length - 1);
  render();
  document.querySelector('.wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function doCopy() {
  navigator.clipboard.writeText('27.677.082/0001-60').catch(() => {});
  const b = document.getElementById('cbtn');
  if (!b) return;
  b.textContent = 'Copiado!';
  b.classList.add('copied');
  setTimeout(() => { b.textContent = 'Copiar CNPJ'; b.classList.remove('copied'); }, 2000);
}

render();
</script>
